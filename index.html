<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brice Frillici — Experiments</title>

<style>
body {
  margin: 0;
  background: #111;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

header {
  text-align: center;
  padding: 60px 20px 10px;
}

h1 {
  font-weight: 500;
  margin: 0;
}

.subtitle {
  opacity: 0.6;
  margin-top: 6px;
  letter-spacing: 1px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
  padding: 60px;
  max-width: 1000px;
  margin: 0 auto;
}

.box {
  height: 180px;
  padding: 20px;
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  transition: 0.3s ease;
  border-radius: 4px;
}

.box:hover {
  transform: translateY(-4px);
  filter: brightness(1.1);
}

.number {
  position: absolute;
  top: 15px;
  left: 20px;
  font-size: 48px;
  font-weight: 600;
  opacity: 0.2;
}

.label {
  font-size: 16px;
  font-weight: 500;
}

/* Primary Color Palette */

.box01 { background: #e10600; }
.box02 { background: #0047ab; }
.box03 { background: #ffd100; color: #111; }
.box04 { background: #008000; }
.box05 { background: #ff6f00; }
.box06 { background: #6a0dad; }

/* Modal */

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  z-index: 100;
}

.modal video {
  width: 85%;
  max-width: 900px;
}

.close {
  position: absolute;
  top: 40px;
  right: 60px;
  font-size: 40px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h1>Brice Frillici</h1>
  <div class="subtitle">Experiments</div>
</header>

<div class="grid">

  <div class="box box01" onclick="openModal()">
    <div class="number">01</div>
    <div class="label">old website</div>
  </div>

  <div class="box box02">
    <div class="number">02</div>
    <div class="label">Coming Soon</div>
  </div>

  <div class="box box03">
    <div class="number">03</div>
    <div class="label">Coming Soon</div>
  </div>

  <div class="box box04">
    <div class="number">04</div>
    <div class="label">Coming Soon</div>
  </div>

  <div class="box box05">
    <div class="number">05</div>
    <div class="label">Coming Soon</div>
  </div>

  <div class="box box06">
    <div class="number">06</div>
    <div class="label">Coming Soon</div>
  </div>

</div>

<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">×</div>
  <video controls autoplay>
    <source src="gold.mp4" type="video/mp4">
  </video>
</div>

<script>
function openModal() {
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  const modal = document.getElementById("modal");
  const video = modal.querySelector("video");
  video.pause();
  video.currentTime = 0;
  modal.style.display = "none";
}
</script>

</body>
</html>
