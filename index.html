<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brice Frillici — Experiments</title>

<style>
body {
  margin: 0;
  background: #0d0d0d;
  color: #e6e6e6;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

header {
  text-align: center;
  padding: 60px 20px 20px;
}

h1 {
  font-weight: 500;
  margin-bottom: 8px;
}

.subtitle {
  opacity: 0.6;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
  padding: 60px;
}

.box {
  background: #1a1a1a;
  padding: 40px;
  cursor: pointer;
  transition: 0.3s ease;
  border: 1px solid #222;
}

.box:hover {
  background: #242424;
  transform: translateY(-4px);
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.modal video {
  width: 80%;
  max-width: 900px;
}

.close {
  position: absolute;
  top: 30px;
  right: 40px;
  font-size: 30px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h1>Brice Frillici</h1>
  <div class="subtitle">Experiments</div>
</header>

<div class="grid">
  <div class="box" onclick="openModal()">
    <h2>01</h2>
    <p>Kelly Becomes AI Artist</p>
  </div>
</div>

<div class="modal" id="modal">
  <div class="close" onclick="closeModal()">×</div>
  <video controls autoplay>
    <source src="gold.mp4" type="video/mp4">
    Your browser does not support video.
  </video>
</div>

<script>
function openModal() {
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  const modal = document.getElementById("modal");
  const video = modal.querySelector("video");
  video.pause();
  video.currentTime = 0;
  modal.style.display = "none";
}
</script>

</body>
</html>
